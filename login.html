<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>印尼语学习助手</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg: #030712; --glass: rgba(17, 24, 39, 0.85);
            --accent: #6366f1; --accent-glow: rgba(99, 102, 241, 0.5);
            --text-main: #f9fafb; --text-muted: #94a3b8;
            --danger: #ef4444; --success: #10b981;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg);
            background-image:
                radial-gradient(at 0% 0%, rgba(99,102,241,0.15) 0%, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168,85,247,0.12) 0%, transparent 50%);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow-y: auto;
        }
        .login-card {
            background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            padding: 40px; border-radius: 30px; width: 100%; max-width: 460px;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center; position: relative; z-index: 10; margin: 20px 0;
        }
        .logo-area { margin-bottom: 30px; }
        .logo-icon { font-size: 3rem; color: var(--accent); text-shadow: 0 0 20px var(--accent-glow); margin-bottom: 15px; }
        h1 { font-size: 1.8rem; font-weight: 800; letter-spacing: -0.025em; margin-bottom: 8px; }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 35px; }

        .input-group { margin-bottom: 16px; text-align: left; }
        .input-label { display: block; font-size: 0.82rem; color: var(--text-muted); margin-bottom: 6px; margin-left: 5px; }
        .input-label .req { color: var(--danger); }
        .input-label .hint { font-size: 0.75rem; color: #6b7280; margin-left: 4px; }
        .input-wrapper { position: relative; }
        .input-wrapper i.icon { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 0.9rem; }
        .login-input {
            width: 100%; padding: 13px 15px 13px 42px;
            background: rgba(30,41,59,0.5); border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px; color: #fff; font-size: 1rem; transition: all 0.3s ease; outline: none;
        }
        .login-input:focus { border-color: var(--accent); background: rgba(30,41,59,0.8); box-shadow: 0 0 0 4px rgba(99,102,241,0.1); }
        .login-input::placeholder { color: #4b5563; }
        .login-input[readonly] { opacity: 0.6; cursor: not-allowed; }
        /* 大写锁定样式 */
        .login-input.uppercase { text-transform: uppercase; }
        .login-input.digitsonly { letter-spacing: 2px; }

        .input-row { display: flex; gap: 10px; }
        .input-row .input-group { flex: 1; }
        .input-row .company-code .login-input { text-transform: uppercase; }
        .input-row .emp-no .login-input { letter-spacing: 2px; }

        .btn-primary {
            width: 100%; padding: 14px; background: var(--accent); color: white;
            border: none; border-radius: 12px; font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s ease; margin-top: 8px;
            box-shadow: 0 10px 15px -3px rgba(99,102,241,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(99,102,241,0.4); filter: brightness(1.1); }
        .btn-primary:active { transform: translateY(0); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .tip-box { margin-top: 16px; padding: 10px; border-radius: 8px; font-size: 0.85rem; display: none; }
        .tip-box.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.2); color: #f87171; }
        .tip-box.success { background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.2); color: #10b981; }

        .online-badge {
            display: inline-flex; align-items: center; gap: 6px;
            padding: 5px 14px; border-radius: 20px; font-size: 0.8rem;
            background: rgba(16,185,129,0.15); color: #10b981; margin-bottom: 15px;
        }
        .online-badge .dot { width: 8px; height: 8px; border-radius: 50%; background: #10b981; animation: pulse 2s infinite; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        .footer-note { margin-top: 25px; font-size: 0.85rem; color: var(--text-muted); }
        .contact-link { color: var(--accent); text-decoration: none; font-weight: 600; cursor: pointer; }
        .contact-link:hover { text-decoration: underline; }

        /* Tab */
        .auth-tabs {
            display: flex; gap: 0; margin-bottom: 25px; border-radius: 12px;
            background: rgba(30,41,59,0.5); padding: 4px; border: 1px solid rgba(255,255,255,0.05);
        }
        .auth-tab {
            flex: 1; padding: 10px; text-align: center; border-radius: 10px;
            cursor: pointer; font-size: 0.95rem; font-weight: 600;
            color: var(--text-muted); transition: all 0.3s;
        }
        .auth-tab.active { background: var(--accent); color: white; }
        .auth-tab:hover:not(.active) { color: var(--text-main); }

        .form-panel { display: none; }
        .form-panel.active { display: block; }

        /* 用户类型选择 */
        .type-selector {
            display: flex; gap: 12px; margin-bottom: 20px;
        }
        .type-card {
            flex: 1; padding: 16px 12px; border-radius: 14px; cursor: pointer;
            border: 2px solid rgba(255,255,255,0.08); background: rgba(30,41,59,0.4);
            transition: all 0.3s; text-align: center;
        }
        .type-card:hover { border-color: rgba(99,102,241,0.3); }
        .type-card.active { border-color: var(--accent); background: rgba(99,102,241,0.1); }
        .type-card i { font-size: 1.6rem; margin-bottom: 8px; display: block; }
        .type-card .type-title { font-size: 0.9rem; font-weight: 700; margin-bottom: 4px; }
        .type-card .type-desc { font-size: 0.75rem; color: var(--text-muted); line-height: 1.4; }
        .type-card.active i { color: var(--accent); }

        /* QR 弹窗 */
        .qr-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.85);
            display: none; justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(10px);
        }
        .qr-card {
            background: #1f2937; padding: 30px; border-radius: 25px;
            border: 1px solid rgba(255,255,255,0.1); text-align: center;
            transform: scale(0.9); animation: qrShow 0.3s forwards;
        }
        @keyframes qrShow { to { transform: scale(1); } }
        .qr-img { width: 240px; height: 240px; border-radius: 15px; margin: 15px 0; border: 4px solid rgba(255,255,255,0.05); }

        /* Light */
        [data-theme="light"] { --bg:#f1f5f9; --glass:rgba(255,255,255,0.9); --accent:#4f46e5; --accent-glow:rgba(79,70,229,0.3); --text-main:#0f172a; --text-muted:#475569; }
        [data-theme="light"] body { background:var(--bg); background-image: radial-gradient(at 0% 0%, rgba(99,102,241,0.08) 0%, transparent 50%), radial-gradient(at 100% 100%, rgba(168,85,247,0.06) 0%, transparent 50%); }
        [data-theme="light"] .login-card { border-color:rgba(0,0,0,0.08); box-shadow:0 25px 50px -12px rgba(0,0,0,0.15); }
        [data-theme="light"] .login-input { background:rgba(241,245,249,0.8); border-color:rgba(0,0,0,0.1); color:#0f172a; }
        [data-theme="light"] .login-input:focus { border-color:var(--accent); background:#fff; }
        [data-theme="light"] .login-input::placeholder { color:#94a3b8; }
        [data-theme="light"] .auth-tabs { background:rgba(0,0,0,0.04); }
        [data-theme="light"] .qr-card { background:#fff; border-color:rgba(0,0,0,0.08); }
        [data-theme="light"] .input-wrapper i { color:var(--text-muted); }
        [data-theme="light"] .online-badge { background:rgba(16,185,129,0.1); }
        [data-theme="light"] .type-card { background:rgba(0,0,0,0.03); border-color:rgba(0,0,0,0.08); }
    </style>
</head>
<body data-theme="dark">
    <div class="login-card">
        <div class="logo-area">
            <div class="logo-icon"><i class="fas fa-book-reader"></i></div>
            <h1>印尼语学习助手</h1>
            <p class="subtitle">Selamat Belajar Bahasa Indonesia!</p>
        </div>

        <div id="online-badge" class="online-badge" style="display:none;">
            <span class="dot"></span>
            <span id="online-text">在线 0 人</span>
            <span id="max-online-text" style="margin-left:8px;color:#64748b;font-size:0.75rem;"></span>
        </div>

        <div class="auth-tabs">
            <div class="auth-tab active" onclick="switchTab('login')">登录</div>
            <div class="auth-tab" onclick="switchTab('register')">注册</div>
        </div>

        <!-- 登录面板 -->
        <div id="panel-login" class="form-panel active">
            <div class="input-group">
                <span class="input-label">账号 / Username</span>
                <div class="input-wrapper">
                    <i class="fas fa-user icon"></i>
                    <input type="text" id="login-username" class="login-input" placeholder="用户名" autocomplete="off" data-1p-ignore>
                </div>
            </div>
            <div class="input-group">
                <span class="input-label">密码 / Password</span>
                <div class="input-wrapper">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="login-password" class="login-input" placeholder="请输入密码" autocomplete="new-password">
                </div>
            </div>
            <button class="btn-primary" id="login-btn" onclick="handleLogin()">立即登录</button>
            <div id="login-tip" class="tip-box"></div>
        </div>

        <!-- 注册面板 -->
        <div id="panel-register" class="form-panel">
            <!-- 用户类型选择 -->
            <div class="type-selector">
                <div class="type-card active" onclick="selectType('employee')">
                    <i class="fas fa-building"></i>
                    <div class="type-title">公司员工</div>
                    <div class="type-desc">需填写公司缩写和工号<br>由管理员验证</div>
                </div>
                <div class="type-card" onclick="selectType('hobby')">
                    <i class="fas fa-heart"></i>
                    <div class="type-title">业余爱好者</div>
                    <div class="type-desc">无需工号验证<br>默认工号 8888888</div>
                </div>
            </div>

            <!-- 基本信息 -->
            <div class="input-group">
                <span class="input-label">用户名 / Username <span class="req">*</span></span>
                <div class="input-wrapper">
                    <i class="fas fa-user-plus icon"></i>
                    <input type="text" id="reg-username" class="login-input" placeholder="2-20位字母或数字" autocomplete="off">
                </div>
            </div>
            <div class="input-group">
                <span class="input-label">昵称 / Name <span class="req">*</span> <span class="hint">（姓名或花名，最多5个汉字或10个字母）</span></span>
                <div class="input-wrapper">
                    <i class="fas fa-id-badge icon"></i>
                    <input type="text" id="reg-name" class="login-input" placeholder="例如：张三、Alex Chen" autocomplete="off" maxlength="10">
                </div>
            </div>
            <div class="input-group">
                <span class="input-label">密码 / Password <span class="req">*</span></span>
                <div class="input-wrapper">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="reg-password" class="login-input" placeholder="至少4位" autocomplete="new-password">
                </div>
            </div>
            <div class="input-group">
                <span class="input-label">确认密码 <span class="req">*</span></span>
                <div class="input-wrapper">
                    <i class="fas fa-lock icon"></i>
                    <input type="password" id="reg-password2" class="login-input" placeholder="再次输入密码" autocomplete="new-password">
                </div>
            </div>

            <!-- 员工信息（仅员工显示） -->
            <div id="employee-fields">
                <div class="input-row">
                    <div class="input-group company-code">
                        <span class="input-label">公司缩写 <span class="req">*</span> <span class="hint">（大写字母，如 WK）</span></span>
                        <div class="input-wrapper">
                            <i class="fas fa-building icon"></i>
                            <input type="text" id="reg-company" class="login-input uppercase" placeholder="WK" maxlength="6" autocomplete="off" style="text-transform:uppercase;">
                        </div>
                    </div>
                    <div class="input-group emp-no">
                        <span class="input-label">工号 <span class="req">*</span> <span class="hint">（纯数字）</span></span>
                        <div class="input-wrapper">
                            <i class="fas fa-id-card icon"></i>
                            <input type="text" id="reg-empno" class="login-input digitsonly" placeholder="123456" autocomplete="off">
                        </div>
                    </div>
                </div>
            </div>

            <button class="btn-primary" id="reg-btn" onclick="handleRegister()">注册账号</button>
            <div id="reg-tip" class="tip-box"></div>
        </div>

        <div class="footer-note">
            遇到问题？请联系系统管理员 <span class="contact-link" onclick="showQR()">王鹤</span>
        </div>
    </div>

    <div id="qr-box" class="qr-overlay" onclick="hideQR()">
        <div class="qr-card" onclick="event.stopPropagation()">
            <h3 style="color:#fff;margin-bottom:5px;">联系开发者</h3>
            <p style="color:var(--text-muted);font-size:0.8rem;">遇到登录问题或申请账号</p>
            <img src="Wang_he.jpg" class="qr-img" alt="二维码">
            <p style="color:var(--accent);font-size:0.85rem;cursor:pointer;" onclick="hideQR()">点击此处关闭</p>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        let selectedType = 'employee';

        function showQR() { document.getElementById('qr-box').style.display = 'flex'; }
        function hideQR() { document.getElementById('qr-box').style.display = 'none'; }

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach((el, i) => {
                el.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'register' && i === 1));
            });
            document.getElementById('panel-login').classList.toggle('active', tab === 'login');
            document.getElementById('panel-register').classList.toggle('active', tab === 'register');
            clearAllTips();
        }

        function clearAllTips() {
            document.querySelectorAll('.tip-box').forEach(el => { el.style.display = 'none'; });
        }

        function showTip(id, msg, type) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'tip-box ' + type;
            el.style.display = 'block';
        }

        // 选择用户类型
        function selectType(type) {
            selectedType = type;
            document.querySelectorAll('.type-card').forEach((el, i) => {
                el.classList.toggle('active', (type === 'employee' && i === 0) || (type === 'hobby' && i === 1));
            });
            const empFields = document.getElementById('employee-fields');
            if (type === 'hobby') {
                empFields.style.display = 'none';
            } else {
                empFields.style.display = 'block';
            }
            clearAllTips();
        }

        // 输入限制
        document.addEventListener('DOMContentLoaded', function() {
            const companyInput = document.getElementById('reg-company');
            companyInput.addEventListener('input', function() {
                this.value = this.value.toUpperCase().replace(/[^A-Z]/g, '');
            });
            const empnoInput = document.getElementById('reg-empno');
            empnoInput.addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '');
            });
        });

        // 注册
        async function handleRegister() {
            const username = document.getElementById('reg-username').value.trim();
            const name = document.getElementById('reg-name').value.trim();
            const password = document.getElementById('reg-password').value.trim();
            const password2 = document.getElementById('reg-password2').value.trim();
            clearAllTips();

            if (!username || !password || !name) { showTip('reg-tip', '用户名、密码和昵称不能为空', 'error'); return; }
            if (username.length < 2 || username.length > 20) { showTip('reg-tip', '用户名长度 2-20 位', 'error'); return; }
            if (password.length < 4) { showTip('reg-tip', '密码至少 4 位', 'error'); return; }
            if (password !== password2) { showTip('reg-tip', '两次密码输入不一致', 'error'); return; }
            if (name.length > 10) { showTip('reg-tip', '昵称最多5个汉字或10个字母', 'error'); return; }

            let companyCode = '', empNo = '';
            if (selectedType === 'employee') {
                companyCode = document.getElementById('reg-company').value.trim();
                empNo = document.getElementById('reg-empno').value.trim();
                if (!companyCode) { showTip('reg-tip', '请填写公司缩写', 'error'); return; }
                if (!empNo) { showTip('reg-tip', '请填写工号', 'error'); return; }
            }

            const btn = document.getElementById('reg-btn');
            btn.disabled = true; btn.textContent = '注册中...';

            const result = await API.register(username, password, name, selectedType, companyCode, empNo);
            btn.disabled = false; btn.textContent = '注册账号';

            if (result.success) {
                showTip('reg-tip', '注册成功！请切换到登录页面', 'success');
                setTimeout(() => switchTab('login'), 1500);
            } else {
                showTip('reg-tip', result.error || '注册失败', 'error');
            }
        }

        // 登录
        async function handleLogin() {
            const username = document.getElementById('login-username').value.trim();
            const password = document.getElementById('login-password').value.trim();
            clearAllTips();

            if (!username || !password) { showTip('login-tip', '请输入用户名和密码', 'error'); return; }

            const btn = document.getElementById('login-btn');
            btn.disabled = true; btn.textContent = '登录中...';

            try {
                if (API.isLoggedIn === undefined) { API.init(); }
                const result = await API.login(username, password);
                if (result.token) {
                    localStorage.setItem('fmi_login_status', JSON.stringify({ isLogin: true, user: result.user, backend: true }));
                    setTimeout(() => { window.location.href = 'index.html'; }, 100);
                } else if (result.error === 'network') {
                    fallbackLogin(username, password);
                } else {
                    showTip('login-tip', result.error || '登录失败', 'error');
                }
            } catch (e) { fallbackLogin(username, password); }
            btn.disabled = false; btn.textContent = '立即登录';
        }

        function fallbackLogin(username, password) {
            const whitelist = JSON.parse(localStorage.getItem('fmi_whitelist') || JSON.stringify([
                { username: "admin", password: "admin123", name: "超级管理员" }
            ]));
            const user = whitelist.find(item => item.username === username && item.password === password);
            if (user) {
                localStorage.setItem('fmi_login_status', JSON.stringify({ isLogin: true, user, backend: false }));
                setTimeout(() => { window.location.href = 'index.html'; }, 100);
            } else { showTip('login-tip', '用户名或密码错误', 'error'); }
        }

        async function loadOnlineCount() {
            try {
                const info = await API.getSystemInfo();
                if (info.error === 'network') return;
                const badge = document.getElementById('online-badge');
                if (info.showOnlineLogin) {
                    badge.style.display = 'inline-flex';
                    document.getElementById('online-text').textContent = '在线 ' + (info.onlineCount || 0) + ' 人';
                    const maxText = document.getElementById('max-online-text');
                    if (info.maxOnline && info.maxOnline > 0) {
                        maxText.textContent = '/ 上限 ' + info.maxOnline + ' 人';
                    } else {
                        maxText.textContent = '';
                    }
                }
                // 更新员工验证提示
        if (info.requireEmployeeVerify === false) {
            const hint = document.getElementById('verify-hint');
            if (hint) hint.textContent = '无需验证';
        }
        if (!info.allowRegister) {
                    document.querySelectorAll('.auth-tab')[1].style.display = 'none';
                }
            } catch (e) {}
        }

        document.body.setAttribute('data-theme', localStorage.getItem('fmi_theme') || 'dark');

        window.onload = function() {
            const status = JSON.parse(localStorage.getItem('fmi_login_status') || '{"isLogin":false}');
            if (status.isLogin) { window.location.href = 'index.html'; return; }
            const todayStr = new Date().toLocaleDateString();
            const savedDate = localStorage.getItem('fmi_study_date');
            if (savedDate && savedDate !== todayStr) {
                localStorage.removeItem('fmi_today_record');
                localStorage.removeItem('fmi_study_stats');
                localStorage.removeItem('fmi_all_words');
                localStorage.setItem('fmi_study_date', todayStr);
            }
            selectType('employee');
            loadOnlineCount();
        };

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                if (document.getElementById('panel-login').classList.contains('active')) handleLogin();
                else handleRegister();
            }
        });
    </script>
</body>
</html>
